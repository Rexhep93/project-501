name: Update Current Season Data

on:
  schedule:
    # Draait elke dag om 06:00 UTC (08:00 NL tijd)
    # Elke run haalt 2 competities op → alle 13 in ~7 dagen
    - cron: '0 6 * * *'
  workflow_dispatch:  # Handmatig triggeren via GitHub UI

jobs:
  fetch-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch current season data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/fetch_current.py --merge

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update 25/26 season data [auto]"
          git push
