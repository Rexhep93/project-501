name: Weekly Season Refresh

on:
  schedule:
    # Elke maandag om 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Handmatig te starten via GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly refresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python data_pipeline/scripts/weekly_refresh.py
