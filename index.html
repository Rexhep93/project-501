<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Project 501</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== START SCREEN ==================== -->
  <div id="startScreen" class="screen active">
    <div class="logo-section">
      <div class="logo-icon">🎯</div>
      <div class="logo-title">PROJECT <span>501</span></div>
      <div class="logo-sub">Football × Darts</div>
    </div>
    <div class="menu-section">
      <button class="menu-btn" data-mode="solo">
        <span class="icon">👤</span> Solo
      </button>
      <button class="menu-btn" data-mode="multi">
        <span class="icon">👥</span> 1 vs 1 Local
      </button>
    </div>
  </div>

  <!-- ==================== SETUP SCREEN ==================== -->
  <div id="setupScreen" class="screen">
    <div class="setup-header">
      <button class="back-btn" data-target="startScreen">←</button>
      <span>Kies een categorie</span>
    </div>
    <div class="setup-section">
      <div class="setup-label">Categorieën</div>
      <div class="category-grid" id="categoryGrid"></div>
    </div>
    <button class="start-game-btn" id="startGameBtn" disabled>Start Game</button>
  </div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <div class="game-category" id="gameCategoryLabel">—</div>
      <div class="game-turn" id="gameTurnLabel">—</div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
    <div class="scoreboard">
      <div class="score-panel active-turn" id="scorePanel1">
        <div class="player-name-label" id="p1Label">Speler 1</div>
        <div class="score-value" id="score1">501</div>
        <div class="score-last" id="last1"></div>
      </div>
      <div class="score-panel" id="scorePanel2">
        <div class="player-name-label" id="p2Label">Speler 2</div>
        <div class="score-value" id="score2">501</div>
        <div class="score-last" id="last2"></div>
      </div>
    </div>
    <div class="input-area">
      <div class="search-wrap">
        <input type="text" class="search-input" id="playerInput"
               placeholder="Typ een spelersnaam..." autocomplete="off" autocapitalize="off">
        <div class="autocomplete-list" id="acList"></div>
      </div>
      <div class="history-section" id="historySection"></div>
    </div>
  </div>

  <!-- ==================== WIN SCREEN ==================== -->
  <div id="winScreen" class="screen">
    <div class="win-trophy">🏆</div>
    <div class="win-title" id="winTitle">Winner!</div>
    <div class="win-detail" id="winDetail"></div>
    <div class="win-scores" id="winScores"></div>
    <div class="menu-section">
      <button class="menu-btn" id="rematchBtn"><span class="icon">🔄</span> Rematch</button>
      <button class="menu-btn" data-target="startScreen"><span class="icon">🏠</span> Menu</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
