<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
    <title>Daily Football Quiz</title>
    <link rel="stylesheet" href="css/styles.css">

    <!-- ================================================================
         ICON SPRITE — custom geometric tile icons + utility icons
         Designed as solid filled shapes, not generic line icons
         ================================================================ -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>

            <!-- ─── TILE ICONS ─── -->

            <!-- Tenable: stacked pyramid (3 layers, navy + teal) -->
            <symbol id="i-tile-tenable" viewBox="0 0 80 80">
                <!-- Bottom row (4) -->
                <rect x="6"  y="56" width="14" height="12" rx="2" fill="#435464"/>
                <rect x="22" y="56" width="14" height="12" rx="2" fill="#435464"/>
                <rect x="38" y="56" width="14" height="12" rx="2" fill="#22ACBA"/>
                <rect x="54" y="56" width="14" height="12" rx="2" fill="#435464"/>
                <!-- Middle row (3) -->
                <rect x="14" y="40" width="14" height="12" rx="2" fill="#435464"/>
                <rect x="32" y="40" width="14" height="12" rx="2" fill="#22ACBA"/>
                <rect x="50" y="40" width="14" height="12" rx="2" fill="#435464"/>
                <!-- Upper row (2) -->
                <rect x="22" y="24" width="14" height="12" rx="2" fill="#22ACBA"/>
                <rect x="42" y="24" width="14" height="12" rx="2" fill="#435464"/>
                <!-- Top (1) -->
                <rect x="32" y="8"  width="14" height="12" rx="2" fill="#22ACBA"/>
            </symbol>

            <!-- Guess the Player: jersey with number -->
            <symbol id="i-tile-player" viewBox="0 0 80 80">
                <path d="M22 14 L14 18 L10 30 L18 34 L22 30 L22 66 Q22 70 26 70 L54 70 Q58 70 58 66 L58 30 L62 34 L70 30 L66 18 L58 14 L48 14 Q48 22 40 22 Q32 22 32 14 Z"
                      fill="#0a84ff" stroke="#0a84ff" stroke-width="0" stroke-linejoin="round"/>
                <text x="40" y="54" text-anchor="middle" fill="white" font-family="-apple-system, system-ui" font-weight="800" font-size="22" letter-spacing="-1">9</text>
            </symbol>

            <!-- Who Am I: silhouette with question mark -->
            <symbol id="i-tile-whoami" viewBox="0 0 80 80">
                <!-- Silhouette -->
                <path d="M40 14 Q31 14 31 24 Q31 33 40 33 Q49 33 49 24 Q49 14 40 14 Z M22 70 Q22 50 40 50 Q58 50 58 70 Z"
                      fill="#ff8a00" opacity="0.30"/>
                <!-- Question mark overlay -->
                <circle cx="40" cy="40" r="20" fill="#ff8a00"/>
                <path d="M34 35 Q34 28 40 28 Q46 28 46 34 Q46 38 42 40 Q40 41.5 40 44"
                      fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="40" cy="50" r="2.2" fill="white"/>
            </symbol>

            <!-- Guess the Club: tactics board with formation dots -->
            <symbol id="i-tile-club" viewBox="0 0 80 80">
                <!-- Pitch background -->
                <rect x="8" y="10" width="64" height="60" rx="6" fill="#2e9b54"/>
                <!-- Pitch lines -->
                <rect x="8" y="10" width="64" height="60" rx="6" fill="none" stroke="white" stroke-width="1.2" opacity="0.6"/>
                <line x1="8" y1="40" x2="72" y2="40" stroke="white" stroke-width="1.2" opacity="0.6"/>
                <circle cx="40" cy="40" r="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.6"/>
                <!-- Formation dots: 4-3-3 -->
                <circle cx="40" cy="64" r="2.6" fill="white"/>
                <circle cx="18" cy="56" r="2.6" fill="white"/>
                <circle cx="32" cy="56" r="2.6" fill="white"/>
                <circle cx="48" cy="56" r="2.6" fill="white"/>
                <circle cx="62" cy="56" r="2.6" fill="white"/>
                <circle cx="24" cy="44" r="2.6" fill="white"/>
                <circle cx="40" cy="44" r="2.6" fill="white"/>
                <circle cx="56" cy="44" r="2.6" fill="white"/>
                <circle cx="22" cy="22" r="2.6" fill="white"/>
                <circle cx="40" cy="20" r="2.6" fill="white"/>
                <circle cx="58" cy="22" r="2.6" fill="white"/>
            </symbol>

            <!-- ─── UI ICONS ─── -->
            <symbol id="i-heart" viewBox="0 0 24 24">
                <path d="M12 21s-7.5-4.5-9.5-9.5C1.2 8.6 3 5 6.5 5c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3C21 5 22.8 8.6 21.5 11.5 19.5 16.5 12 21 12 21z"/>
            </symbol>
            <symbol id="i-back" viewBox="0 0 24 24">
                <path d="M15 18 9 12l6-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-arrow-right" viewBox="0 0 24 24">
                <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-check" viewBox="0 0 24 24">
                <path d="m5 12 5 5L20 7" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-cross" viewBox="0 0 24 24">
                <path d="M18 6 6 18M6 6l12 12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-info" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="12" cy="7.5" r="1.4" fill="currentColor"/>
            </symbol>
            <symbol id="i-trophy" viewBox="0 0 24 24">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-shield" viewBox="0 0 32 32">
                <path d="M16 4 6 7v9c0 6 4 11 10 12 6-1 10-6 10-12V7l-10-3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </symbol>
        </defs>
    </svg>

    <!-- Toast container — outside any screen so it stays mounted -->
    <div id="toast-stack" class="toast-stack" aria-live="polite"></div>

    <!-- ================================================================
         HOME / MENU
         ================================================================ -->
    <section id="menu-screen" class="screen active">
        <div class="menu-container">
            <header class="app-header">
                <h1 class="large-title">Daily Football Quiz</h1>
                <p class="subtitle" id="date-display"></p>
            </header>

            <div class="menu-progress">
                <div class="progress-row">
                    <span class="progress-label">Today's progress</span>
                    <span class="progress-count" id="progress-count">0/4</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <p class="menu-cta">Complete the 4 quizzes for your daily score!</p>

            <div class="games-grid">
                <button class="game-tile" data-game="tenable">
                    <div class="tile-check"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></div>
                    <div class="tile-icon"><svg viewBox="0 0 80 80"><use href="#i-tile-tenable"/></svg></div>
                    <h2 class="tile-title">Tenable</h2>
                    <p class="tile-sub">Top 10 list</p>
                    <span class="tile-score" data-score-tile="tenable"></span>
                </button>

                <button class="game-tile" data-game="guessPlayer">
                    <div class="tile-check"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></div>
                    <div class="tile-icon"><svg viewBox="0 0 80 80"><use href="#i-tile-player"/></svg></div>
                    <h2 class="tile-title">Guess the Player</h2>
                    <p class="tile-sub">Career path</p>
                    <span class="tile-score" data-score-tile="guessPlayer"></span>
                </button>

                <button class="game-tile" data-game="whoAmI">
                    <div class="tile-check"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></div>
                    <div class="tile-icon"><svg viewBox="0 0 80 80"><use href="#i-tile-whoami"/></svg></div>
                    <h2 class="tile-title">Who Am I</h2>
                    <p class="tile-sub">3 hints, 5 lives</p>
                    <span class="tile-score" data-score-tile="whoAmI"></span>
                </button>

                <button class="game-tile" data-game="guessClub">
                    <div class="tile-check"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></div>
                    <div class="tile-icon"><svg viewBox="0 0 80 80"><use href="#i-tile-club"/></svg></div>
                    <h2 class="tile-title">Guess the Club</h2>
                    <p class="tile-sub">Lineup challenge</p>
                    <span class="tile-score" data-score-tile="guessClub"></span>
                </button>
            </div>
        </div>
    </section>

    <!-- ================================================================
         TENABLE
         ================================================================ -->
    <section id="tenable-screen" class="screen tenable-theme">
        <header class="game-header">
            <button class="back-btn" data-back>
                <svg viewBox="0 0 24 24"><use href="#i-back"/></svg>
            </button>
            <h2 class="game-title">Tenable</h2>
            <div class="lives" id="tenable-lives" data-count="3"></div>
        </header>
        <div class="tenable-question">
            <p class="question-text" id="tenable-question"></p>
            <p class="question-sub" id="tenable-subtitle"></p>
        </div>
        <div class="tenable-pyramid-wrap">
            <div class="tenable-pyramid" id="tenable-pyramid"></div>
        </div>
        <div class="input-area">
            <form id="tenable-form" autocomplete="off">
                <input type="text" id="tenable-input" placeholder="Type a name…"
                       autocomplete="off" autocorrect="off" autocapitalize="words"
                       spellcheck="false">
                <button type="submit" class="submit-btn">
                    <svg viewBox="0 0 24 24"><use href="#i-arrow-right"/></svg>
                </button>
            </form>
        </div>
    </section>

    <!-- ================================================================
         GUESS THE PLAYER
         ================================================================ -->
    <section id="guessPlayer-screen" class="screen">
        <header class="game-header">
            <button class="back-btn" data-back>
                <svg viewBox="0 0 24 24"><use href="#i-back"/></svg>
            </button>
            <h2 class="game-title">Guess the Player</h2>
            <div class="score-badge" id="guessPlayer-score">5 pt</div>
        </header>
        <div class="career-banner">Career Path · Clubs not in order</div>
        <div class="clubs-container" id="clubs-container"></div>
        <div class="attempts-row">
            <span class="attempts-label">Attempts</span>
            <div class="lives" id="guessPlayer-lives" data-count="5"></div>
        </div>
        <div class="input-area">
            <form id="guessPlayer-form" autocomplete="off">
                <input type="text" id="guessPlayer-input" placeholder="Which player?"
                       autocomplete="off" autocorrect="off" autocapitalize="words"
                       spellcheck="false">
                <button type="submit" class="submit-btn">
                    <svg viewBox="0 0 24 24"><use href="#i-arrow-right"/></svg>
                </button>
            </form>
        </div>
    </section>

    <!-- ================================================================
         WHO AM I
         ================================================================ -->
    <section id="whoAmI-screen" class="screen">
        <header class="game-header">
            <button class="back-btn" data-back>
                <svg viewBox="0 0 24 24"><use href="#i-back"/></svg>
            </button>
            <h2 class="game-title">Who Am I</h2>
            <div class="score-badge" id="whoAmI-score">5 pt</div>
        </header>
        <div class="dossier-banner">Player Dossier · 3 Clues</div>
        <div class="hints-container" id="hints-container"></div>
        <div class="attempts-row">
            <span class="attempts-label">Attempts</span>
            <div class="lives" id="whoAmI-lives" data-count="5"></div>
        </div>
        <div class="input-area">
            <form id="whoAmI-form" autocomplete="off">
                <input type="text" id="whoAmI-input" placeholder="Which player?"
                       autocomplete="off" autocorrect="off" autocapitalize="words"
                       spellcheck="false">
                <button type="submit" class="submit-btn">
                    <svg viewBox="0 0 24 24"><use href="#i-arrow-right"/></svg>
                </button>
            </form>
        </div>
    </section>

    <!-- ================================================================
         GUESS THE CLUB
         ================================================================ -->
    <section id="guessClub-screen" class="screen">
        <header class="game-header">
            <button class="back-btn" data-back>
                <svg viewBox="0 0 24 24"><use href="#i-back"/></svg>
            </button>
            <h2 class="game-title">Guess the Club</h2>
            <div class="score-badge" id="guessClub-score">5 pt</div>
        </header>
        <div class="club-year-badge" id="guessClub-year"></div>
        <div class="formation-container" id="formation-container"></div>
        <div class="attempts-row">
            <span class="attempts-label">Attempts</span>
            <div class="lives" id="guessClub-lives" data-count="3"></div>
        </div>
        <div class="input-area">
            <form id="guessClub-form" autocomplete="off">
                <input type="text" id="guessClub-input" placeholder="Which club?"
                       autocomplete="off" autocorrect="off" autocapitalize="words"
                       spellcheck="false">
                <button type="submit" class="submit-btn">
                    <svg viewBox="0 0 24 24"><use href="#i-arrow-right"/></svg>
                </button>
            </form>
        </div>
    </section>

    <!-- Result modal (per-game finish) -->
    <div id="result-modal" class="modal">
        <div class="modal-content">
            <div class="result-icon" id="result-icon"></div>
            <h2 class="result-title" id="result-title"></h2>
            <p class="result-score" id="result-score"></p>
            <div class="result-reveal" id="result-reveal"></div>
            <button class="primary-btn" id="result-continue">Back to menu</button>
        </div>
    </div>

    <!-- Total modal (all 4 done) -->
    <div id="total-modal" class="modal">
        <div class="modal-content">
            <div class="trophy-icon">
                <svg viewBox="0 0 24 24"><use href="#i-trophy"/></svg>
            </div>
            <h2 class="result-title">Daily total</h2>
            <p class="total-big" id="total-score">0/25</p>
            <div class="total-breakdown" id="total-breakdown"></div>
            <button class="primary-btn" id="total-continue">Close</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
